name: CI

on:
  pull_request:
    branches:
      - master

# Required for dorny/test-reporter to post check results on PRs
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run lint
        run: npm run lint

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests
        run: npm test -- --no-coverage --forceExit

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Unit Test Results'
          path: 'test-results/junit-unit.xml'
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run E2E tests
        run: NODE_OPTIONS='--experimental-vm-modules' npx jest --config ./test/jest-e2e.json --no-coverage --forceExit

      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'E2E Test Results'
          path: 'test-results/junit-e2e.xml'
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

