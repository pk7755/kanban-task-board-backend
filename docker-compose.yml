version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanban
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanban_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kanban
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-production}
      SEED_MANAGER_EMAIL: ${SEED_MANAGER_EMAIL:-manager@example.com}
      SEED_MANAGER_PASSWORD: ${SEED_MANAGER_PASSWORD:-Manager@123}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
